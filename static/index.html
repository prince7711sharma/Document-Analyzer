<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Analyzer | R.S Education Solution</title>
    <meta name="description" content="🎓 AI-Powered Document Analyzer for Student Academic Documents">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="hero-section">
        <div class="logo-badge">
            <i class="fas fa-file-invoice"></i>
        </div>
        <h1>Smart Document Analyzer</h1>
        <p>Instantly extract data, verify authenticity, and check course eligibility from academic documents.</p>
    </div>

    <main>
        <div class="analyzer-grid">
            <!-- Left Column: Inputs & Upload -->
            <div class="upload-sidebar clay">
                <div class="form-group">
                    <label>Document Type</label>
                    <select class="clay-input">
                        <option>10th / 12th Marksheet</option>
                        <option>College Certificate</option>
                        <option>Identity Document</option>
                        <option>Resume / CV</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Student Name (Optional)</label>
                    <input type="text" class="clay-input" placeholder="Enter name">
                </div>

                <div class="form-group">
                    <label>Upload File</label>
                    <div id="drop-zone" class="upload-area">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p id="file-status">PNG, JPG, PDF up to 5MB</p>
                        <input type="file" id="file-input" hidden accept=".jpg,.jpeg,.png,.pdf">
                    </div>
                </div>

                <div id="preview-section" class="hidden">
                     <div id="file-preview" class="file-preview mt-2"></div>
                </div>

                <button id="analyze-btn" class="btn-analyze" onclick="analyzeDocument()">
                    Analyze Document
                </button>

                <!-- Loading State -->
                <div id="loading-overlay" class="loading-overlay hidden mt-4">
                    <div class="loader"></div>
                    <p class="text-muted">AI is processing...</p>
                </div>
            </div>

            <!-- Right Column: Results -->
            <div id="result-card" class="results-container hidden">
                <div class="analysis-summary clay stagger-item delay-1">
                    <h2>Analysis Summary</h2>
                    <p id="analysis-summary" class="summary-box"></p>
                </div>

                <div class="bottom-grid">
                    <div class="result-section clay stagger-item delay-2">
                        <h3><i class="fas fa-check-circle"></i> Extracted Data</h3>
                        <div id="extracted-data-list">
                            <!-- Data items here -->
                        </div>
                    </div>

                    <div id="eligible-courses-section" class="result-section clay stagger-item delay-3">
                        <h3><i class="fas fa-chevron-right"></i> Eligible Courses</h3>
                        <div id="recommended-courses">
                            <!-- Pills here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 R.S Education Solution. Intelligent Document Processing System.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileStatus = document.getElementById('file-status');
        const resultCard = document.getElementById('result-card');
        const loadingOverlay = document.getElementById('loading-overlay');
        const analyzeBtn = document.getElementById('analyze-btn');
        
        let selectedFile = null;

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = '#d1d9e6'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file) return;
            selectedFile = file;
            fileStatus.innerHTML = `<strong>${file.name}</strong><br>Ready to analyze`;
            fileStatus.style.color = 'var(--primary)';
        }

        async function analyzeDocument() {
            if (!selectedFile) {
                alert("Please upload a file first!");
                return;
            }

            const btn = document.getElementById('analyze-btn');
            
            // Ripple effect
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);

            analyzeBtn.disabled = true;
            loadingOverlay.classList.remove('hidden');
            resultCard.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await axios.post('/analyze-document', formData);
                const result = response.data;

                if (result.status === 'success') {
                    displayResult(result.data);
                }
            } catch (error) {
                const errorMsg = error.response?.data?.detail || error.message || 'Analysis failed';
                alert('Analysis Failed: ' + errorMsg);
            } finally {
                loadingOverlay.classList.add('hidden');
                analyzeBtn.disabled = false;
            }
        }

        function displayResult(data) {
            document.getElementById('analysis-summary').textContent = data.analysis_summary;
            
            const dataList = document.getElementById('extracted-data-list');
            dataList.innerHTML = '';
            
            const extracted = data.extracted_data;
            const items = [
                { label: 'Document Type', value: extracted.document_type || 'Unknown' },
                { label: 'Analysis Note', value: extracted.analysis_note || 'N/A' },
                { label: 'Key Fields', value: extracted.key_fields || 'N/A' }
            ];

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'data-box';
                div.innerHTML = `<label>${item.label}</label><span>${item.value}</span>`;
                dataList.appendChild(div);
            });

            const coursesContainer = document.getElementById('recommended-courses');
            coursesContainer.innerHTML = '';
            data.eligible_courses.forEach(course => {
                const span = document.createElement('span');
                span.className = 'course-pill';
                span.textContent = course;
                coursesContainer.appendChild(span);
            });

            resultCard.classList.remove('hidden');
            resultCard.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
