services:
  - type: web
    name: document-analyzer-api
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"           # Forces Render to use Python 3.11 (not 3.14)
      - key: GROQ_API_KEY
        sync: false               # Set this manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: APP_NAME
        value: R.S Education Document Analyzer
      - key: APP_VERSION
        value: 1.0.0
      - key: TEMP_DIR
        value: /tmp/uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
